<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://static.wixstatic.com/media/81ba89_514c18d8af5e4574b4812e7d27775511~mv2.png">
<title>ZALC — Admin Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A1F3D; --ink-deep:#050F1F; --ink-soft:#3C4E65;
    --gold:#C9A227; --gold-deep:#9C7C15; --gold-light:#E4C660;
    --cream:#FFFFFF; --parchment:#F3EFE1; --parchment-deep:#E9E0C4; --line:#D6CBA0;
    --error:#B3261E; --ok:#3E6B2C; --ok-bg:#EAF3E4; --ok-line:#C7DEB8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 12% 8%, rgba(10,31,61,0.06), transparent 42%),
      radial-gradient(circle at 88% 92%, rgba(201,162,39,0.10), transparent 46%),
      var(--parchment);
    background-attachment:fixed;
    font-family:'Inter', sans-serif;
    color:var(--ink);
    min-height:100vh;
    padding:clamp(16px,5vw,32px) clamp(12px,4vw,16px) 60px;
  }
  .wrap{ max-width:1100px; margin:0 auto; }

  @keyframes riseIn{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);} }

  /* header */
  .topbar{
    background:var(--ink-deep); color:var(--cream);
    border-radius:14px; padding:18px 24px; margin-bottom:22px;
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    position:relative; overflow:hidden;
  }
  .topbar::before{ content:""; position:absolute; left:0; right:0; top:0; height:4px; background:linear-gradient(90deg, var(--gold-deep), var(--gold), var(--gold-light)); }
  .topbar h1{ font-family:'Fraunces',serif; font-weight:600; font-size:19px; margin:0; text-transform:uppercase; }
  .topbar .sub{ font-size:12px; color:#C9D2E0; margin-top:4px; }
  .logout-btn{
    background:none; border:1px solid rgba(255,255,255,0.3); color:var(--cream);
    border-radius:8px; padding:8px 14px; font-family:'IBM Plex Mono',monospace; font-size:11px;
    letter-spacing:1px; cursor:pointer; text-transform:uppercase;
  }
  .logout-btn:hover{ border-color:var(--gold-light); color:var(--gold-light); }

  /* ===== login gate ===== */
  .login-card{
    max-width:400px; margin:8vh auto 0; background:var(--cream);
    border:1px solid var(--line); border-radius:14px; padding:32px 28px;
    box-shadow:0 18px 40px -20px rgba(10,31,61,0.30); animation:riseIn .5s ease both;
    text-align:center;
  }
  .login-card .crest{ width:52px; height:52px; margin:0 auto 14px; border-radius:10px; background:var(--parchment); border:1.5px solid var(--gold); padding:6px; }
  .login-card .crest img{ width:100%; height:100%; object-fit:contain; border-radius:4px; }
  .login-card h2{ font-family:'Fraunces',serif; font-size:20px; margin:0 0 6px; text-transform:uppercase; }
  .login-card p.note{ font-size:12.5px; color:var(--ink-soft); margin:0 0 22px; line-height:1.6; }
  .login-card input[type=password]{
    width:100%; background:var(--parchment); border:1.5px solid var(--line); border-radius:8px;
    padding:13px 14px; font-family:'IBM Plex Mono',monospace; font-size:15px; color:var(--ink);
    outline:none; text-align:center; letter-spacing:2px;
  }
  .login-card input[type=password]:focus{ border-color:var(--gold-deep); background:var(--cream); box-shadow:0 0 0 3px rgba(201,162,39,0.15); }
  .login-btn{
    width:100%; background:var(--ink); color:var(--cream); border:none; border-radius:9px;
    padding:14px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; letter-spacing:1.5px;
    font-weight:600; cursor:pointer; margin-top:14px; text-transform:uppercase;
  }
  .login-btn:hover:not(:disabled){ background:var(--ink-deep); }
  .login-btn:disabled{ opacity:.5; cursor:not-allowed; }
  .login-err{ font-size:12px; color:var(--error); margin-top:12px; min-height:16px; }

  /* ===== dashboard ===== */
  #dashboard{ display:none; }
  #dashboard.show{ display:block; animation:riseIn .4s ease both; }

  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:18px; }
  .toolbar input[type=text]{
    flex:1; min-width:180px; background:var(--cream); border:1.5px solid var(--line); border-radius:8px;
    padding:10px 12px; font-family:'Inter',sans-serif; font-size:14px; color:var(--ink); outline:none;
  }
  .toolbar .filter-btn{
    background:var(--cream); border:1.5px solid var(--line); border-radius:8px; padding:10px 14px;
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.8px; color:var(--ink-soft);
    cursor:pointer; text-transform:uppercase; white-space:nowrap;
  }
  .toolbar .filter-btn.on{ background:var(--ink); color:var(--cream); border-color:var(--ink); }
  .count-badge{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); white-space:nowrap; }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(270px, 1fr)); gap:18px; }
  .card{
    background:var(--cream); border:1px solid var(--line); border-radius:12px; overflow:hidden;
    box-shadow:0 12px 28px -18px rgba(10,31,61,0.28); display:flex; flex-direction:column;
    transition:border-color .15s, transform .1s;
  }
  .card.selected{ border-color:var(--gold-deep); box-shadow:0 0 0 3px rgba(201,162,39,0.18); }
  .card .thumb{
    width:100%; aspect-ratio:1/1; background:var(--parchment-deep);
    display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative;
  }
  .card .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card .thumb .pdf-badge{
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px; color:var(--ink-soft);
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .card .thumb a.open-link{
    position:absolute; bottom:8px; right:8px; background:var(--ink-deep); color:var(--cream);
    font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.5px; padding:6px 10px;
    border-radius:6px; text-decoration:none; text-transform:uppercase;
  }
  .card .best-flag{
    position:absolute; top:8px; left:8px; background:var(--gold-deep); color:var(--cream);
    font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.8px; padding:5px 9px;
    border-radius:6px; display:none; text-transform:uppercase;
  }
  .card.selected .best-flag{ display:block; }
  .card .body{ padding:14px 15px 16px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .card .zalc-name{ font-family:'Fraunces',serif; font-weight:600; font-size:16px; color:var(--ink); text-transform:uppercase; line-height:1.3; }
  .card .designer{ font-size:12.5px; color:var(--ink-soft); }
  .card .designer b{ color:var(--ink); }
  .card .meta-row{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft); display:flex; justify-content:space-between; margin-top:2px; }
  .card .pick-btn{
    margin-top:10px; width:100%; border:1.5px solid var(--gold-deep); background:none; color:var(--gold-deep);
    border-radius:8px; padding:10px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:1px;
    font-weight:600; cursor:pointer; text-transform:uppercase; transition:background .15s, color .15s;
  }
  .card .pick-btn:hover{ background:var(--gold-deep); color:var(--cream); }
  .card.selected .pick-btn{ background:var(--gold-deep); color:var(--cream); }
  .card .pick-btn:disabled{ opacity:.5; cursor:wait; }

  .empty-state, .loading-state{ text-align:center; color:var(--ink-soft); padding:60px 10px; font-size:13px; }

  @media (max-width:480px){ .grid{ grid-template-columns:1fr 1fr; gap:12px; } .card .zalc-name{ font-size:14px; } }
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== LOGIN ===== -->
  <div class="login-card" id="loginCard">
    <div class="crest"><img src="https://static.wixstatic.com/media/81ba89_514c18d8af5e4574b4812e7d27775511~mv2.png" alt="Crest"></div>
    <h2>Admin Review</h2>
    <p class="note">Zoologist Association of Loyola College<br>Enter the admin password to review submissions.</p>
    <input type="password" id="pwInput" placeholder="Password" autocomplete="current-password">
    <button class="login-btn" id="loginBtn">Unlock</button>
    <p class="login-err" id="loginErr"></p>
  </div>

  <!-- ===== DASHBOARD ===== -->
  <div id="dashboard">
    <div class="topbar">
      <div>
        <h1>Name &amp; Logo Review</h1>
        <div class="sub">Tap a card to mark it as the selected winner.</div>
      </div>
      <button class="logout-btn" id="logoutBtn">Log Out</button>
    </div>

    <div class="toolbar">
      <input type="text" id="searchBox" placeholder="Search by name or designer…">
      <button class="filter-btn" id="filterSelectedBtn">Selected Only</button>
      <button class="filter-btn" id="refreshBtn">Refresh</button>
      <span class="count-badge" id="countBadge"></span>
    </div>

    <div id="listArea"><div class="loading-state">Loading submissions…</div></div>
  </div>

</div>

<script>
/* ============ CONFIG ============ */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzV3ZbmqNvly5pDK9x9Cwf-QPBByIhd7YvuRfQ1BMQ8xaH6OvmNxXEj1WCHmyeq1vJXgw/exec";
const TOKEN_STORAGE_KEY = 'zalc_admin_token';

/* ============ generic JSONP helper (matches the main form's pattern) ============ */
function jsonp_(paramsObj){
  return new Promise((resolve, reject)=>{
    const cbName = 'zalcAdminCb_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
    let settled = false;
    const cleanup = ()=>{ delete window[cbName]; if(script.parentNode) script.parentNode.removeChild(script); clearTimeout(timer); };
    window[cbName] = (result)=>{ if(settled) return; settled = true; cleanup(); resolve(result); };
    const qs = Object.keys(paramsObj).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(paramsObj[k])).join('&');
    const script = document.createElement('script');
    script.src = APPS_SCRIPT_URL + '?' + qs + '&callback=' + cbName;
    script.onerror = ()=>{ if(settled) return; settled = true; cleanup(); reject(new Error('network')); };
    const timer = setTimeout(()=>{ if(settled) return; settled = true; cleanup(); reject(new Error('timeout')); }, 10000);
    document.body.appendChild(script);
  });
}

async function sha256Hex_(str){
  if(!window.crypto || !window.crypto.subtle){
    throw new Error('This page needs to be loaded over HTTPS for secure login to work.');
  }
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ============ session ============ */
function saveSession(token, expiresInSeconds){
  const expiry = Date.now() + expiresInSeconds*1000;
  sessionStorage.setItem(TOKEN_STORAGE_KEY, JSON.stringify({ token, expiry }));
}
function getSessionToken(){
  try{
    const raw = sessionStorage.getItem(TOKEN_STORAGE_KEY);
    if(!raw) return null;
    const { token, expiry } = JSON.parse(raw);
    if(Date.now() >= expiry) { sessionStorage.removeItem(TOKEN_STORAGE_KEY); return null; }
    return token;
  } catch(e){ return null; }
}
function clearSession(){ sessionStorage.removeItem(TOKEN_STORAGE_KEY); }

/* ============ elements ============ */
const loginCard = document.getElementById('loginCard');
const dashboard = document.getElementById('dashboard');
const pwInput = document.getElementById('pwInput');
const loginBtn = document.getElementById('loginBtn');
const loginErr = document.getElementById('loginErr');
const logoutBtn = document.getElementById('logoutBtn');
const listArea = document.getElementById('listArea');
const searchBox = document.getElementById('searchBox');
const filterSelectedBtn = document.getElementById('filterSelectedBtn');
const refreshBtn = document.getElementById('refreshBtn');
const countBadge = document.getElementById('countBadge');

let allRows = [];
let showSelectedOnly = false;

/* ============ login flow (challenge / response — password/hash never sent) ============ */
async function attemptLogin(){
  const pw = pwInput.value;
  if(!pw) return;
  loginBtn.disabled = true;
  loginErr.textContent = '';
  loginBtn.textContent = 'Checking…';
  try{
    const challenge = await jsonp_({ action:'adminChallenge' });
    if(challenge.status !== 'ok') throw new Error('Could not start login.');
    const pwHash = await sha256Hex_(pw);
    const response = await sha256Hex_(challenge.nonce + ':' + pwHash);
    const result = await jsonp_({ action:'adminLogin', nonce: challenge.nonce, response });

    if(result.status === 'ok'){
      saveSession(result.token, result.expiresInSeconds);
      pwInput.value = '';
      showDashboard();
      loadList();
    } else if(result.status === 'locked'){
      const mins = Math.ceil(result.retryAfterSeconds/60);
      loginErr.textContent = `Too many attempts. Try again in about ${mins} minute${mins===1?'':'s'}.`;
    } else {
      loginErr.textContent = 'Incorrect password.';
    }
  } catch(err){
    loginErr.textContent = 'Network error — please try again.';
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = 'Unlock';
  }
}
loginBtn.addEventListener('click', attemptLogin);
pwInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') attemptLogin(); });

logoutBtn.addEventListener('click', ()=>{
  clearSession();
  location.reload();
});

function showDashboard(){
  loginCard.style.display = 'none';
  dashboard.classList.add('show');
}

/* ============ data loading ============ */
async function loadList(){
  const token = getSessionToken();
  if(!token){ location.reload(); return; }
  listArea.innerHTML = '<div class="loading-state">Loading submissions…</div>';
  try{
    const result = await jsonp_({ action:'adminList', token });
    if(result.status === 'unauthorized'){
      clearSession();
      location.reload();
      return;
    }
    allRows = result.rows || [];
    render();
  } catch(err){
    listArea.innerHTML = '<div class="loading-state">Could not load submissions — check your connection and refresh.</div>';
  }
}

function render(){
  const q = searchBox.value.trim().toLowerCase();
  let rows = allRows.filter(r=>{
    if(showSelectedOnly && !r.selected) return false;
    if(!q) return true;
    return (r.zalcName||'').toLowerCase().includes(q) || (r.name||'').toLowerCase().includes(q) || (r.specimenId||'').toLowerCase().includes(q);
  });

  countBadge.textContent = rows.length + ' of ' + allRows.length + ' submissions';

  if(rows.length === 0){
    listArea.innerHTML = '<div class="empty-state">No submissions match.</div>';
    return;
  }

  listArea.innerHTML = '<div class="grid" id="grid"></div>';
  const grid = document.getElementById('grid');

  rows.forEach(r=>{
    const card = document.createElement('div');
    card.className = 'card' + (r.selected ? ' selected' : '');

    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    if(r.isPdf){
      thumb.innerHTML = `<div class="pdf-badge">📄<br>PDF LOGO</div>` +
        (r.logoUrl ? `<a class="open-link" href="${r.logoUrl}" target="_blank" rel="noopener">Open</a>` : '');
    } else if(r.logoImageUrl){
      thumb.innerHTML = `<img src="${r.logoImageUrl}" alt="Logo for ${escapeHtml_(r.zalcName)}" loading="lazy">` +
        (r.logoUrl ? `<a class="open-link" href="${r.logoUrl}" target="_blank" rel="noopener">Full size</a>` : '');
    } else {
      thumb.innerHTML = `<div class="pdf-badge">No file</div>`;
    }
    thumb.innerHTML += `<div class="best-flag">★ Selected</div>`;

    const body = document.createElement('div');
    body.className = 'body';
    body.innerHTML = `
      <div class="zalc-name">${escapeHtml_(r.zalcName)}</div>
      <div class="designer">Designed by <b>${escapeHtml_(r.name)}</b></div>
      <div class="meta-row"><span>${escapeHtml_(r.specimenId)}</span><span>${formatDate_(r.timestamp)}</span></div>
    `;

    const btn = document.createElement('button');
    btn.className = 'pick-btn';
    btn.textContent = r.selected ? '★ Selected as best' : 'Mark as best';
    btn.addEventListener('click', ()=>toggleBest(r, btn, card));
    body.appendChild(btn);

    card.appendChild(thumb);
    card.appendChild(body);
    grid.appendChild(card);
  });
}

async function toggleBest(row, btn, card){
  const token = getSessionToken();
  if(!token){ location.reload(); return; }
  const newState = !row.selected;
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try{
    const result = await jsonp_({ action:'adminSelectBest', token, id: row.rowIndex, mark: newState ? '1':'0' });
    if(result.status === 'unauthorized'){ clearSession(); location.reload(); return; }
    if(result.status === 'ok'){
      row.selected = result.selected;
      card.classList.toggle('selected', row.selected);
      btn.textContent = row.selected ? '★ Selected as best' : 'Mark as best';
    } else {
      btn.textContent = 'Error — retry';
    }
  } catch(err){
    btn.textContent = 'Network error — retry';
  } finally {
    btn.disabled = false;
  }
}

function escapeHtml_(s){
  return String(s||'').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function formatDate_(ts){
  if(!ts) return '';
  const d = new Date(ts);
  if(isNaN(d)) return '';
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
}

searchBox.addEventListener('input', render);
filterSelectedBtn.addEventListener('click', ()=>{
  showSelectedOnly = !showSelectedOnly;
  filterSelectedBtn.classList.toggle('on', showSelectedOnly);
  render();
});
refreshBtn.addEventListener('click', loadList);

/* ============ boot ============ */
(function init(){
  const token = getSessionToken();
  if(token){ showDashboard(); loadList(); }
})();
</script>
</body>
</html>
